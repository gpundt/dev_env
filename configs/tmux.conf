# ──── General ──────────────────────────────────────────────────────────────────────────────────
set -g escape-time 0               # No delay after pressing Escape (critical for Vim/Neovim)
set -g repeat-time 600             # Longer window for repeatable key bindings
set -g focus-events on             # Pass focus events through to apps (Vim autoread, etc.)
set -sg terminal-overrides ",*:RGB" # True 24-bit color — pairs well with your zsh colors
set -g base-index 1                # Windows start at 1 (not 0)
set -g pane-base-index 1           # Panes start at 1 too
set -g renumber-windows on         # Auto-renumber windows when one is closed

# ──── Colors ──────────────────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Ms=\E]12;%p1%s\007'


# ──── Mouse ───────────────────────────────────────────────────────────────────────────────────
set -g mouse on


# ──── History ─────────────────────────────────────────────────────────────────────────────────
set -g history-limit 50000
set -g history-file ~/.tmux_history

# ──── Status Bar ──────────────────────────────────────────────────────────────────────────────
set -g status on
set -g status-position top          # Modern look — status bar on top
set -g status-interval 2            # Refresh every 2 seconds

# ──── Plugins ──────────────────────────────────────────────────────────────────────────────────

set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'


run '~/.tmux/plugins/tpm/tpm'