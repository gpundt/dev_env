# ──── General ──────────────────────────────────────────────────────────────────────────────────
set -g escape-time 0               # No delay after pressing Escape (critical for Vim/Neovim)
set -g repeat-time 600             # Longer window for repeatable key bindings
set -g focus-events on             # Pass focus events through to apps (Vim autoread, etc.)
set -sg terminal-overrides ",*:RGB" # True 24-bit color — pairs well with your zsh colors
set -g base-index 1                # Windows start at 1 (not 0)
set -g pane-base-index 1           # Panes start at 1 too
set -g renumber-windows on         # Auto-renumber windows when one is closed


# ──── Colors ──────────────────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Ms=\E]12;%p1%s\007'


# ──── Mouse ───────────────────────────────────────────────────────────────────────────────────
set -g mouse on


# ──── History ─────────────────────────────────────────────────────────────────────────────────
set -g history-limit 50000
set -g history-file ~/.tmux_history

# ──── Status Bar ──────────────────────────────────────────────────────────────────────────────
set -g status on
set -g status-position top          # Modern look — status bar on top
set -g status-interval 2            # Refresh every 2 seconds
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"   # Dark base, light text (Catppuccin-style)

# Left: session name with a subtle label
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] 󰊠 #S #[bg=#1e1e2e,fg=#89b4fa]"

# Right: host + time
set -g status-right-length 80
set -g status-right "#[fg=#585b70]│ #[fg=#a6adc8]%a %b %d #[fg=#585b70]│ #[fg=#cdd6f4,bold]%H:%M "

# Window tabs — inactive
set -g window-status-format " #[fg=#585b70]#I #[fg=#a6adc8]#W "

# Window tabs — active
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I #[fg=#cdd6f4]#W "

set -g window-status-separator ""   # Remove default separator between tabs