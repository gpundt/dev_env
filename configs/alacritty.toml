# Window configurations
[window]
padding = { x = 12, y = 12 }
dynamic_title = true
opacity = 0.90
blur = true

[window.dimensions]
columns = 100
lines = 30

# Font configurations
[font]
size = 12.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

# Terminal bell behavior
[bell]
animation = "EaseOutExpo"
duration = 100

# Custom keyboard shortcuts
[keyboard]
bindings = [
    # Spawn a new terminal instance in the current working directory
    { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" }
]